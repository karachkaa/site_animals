<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Сообщаем браузеру, что страница поддерживает обе схемы -->
  <meta name="color-scheme" content="light dark">
  <title>Светлая и тёмная тема</title>
  
  <link rel="stylesheet" href="style.css">
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header>
    <h1>Переключение темы</h1>
    <button id="theme-toggle" aria-label="Переключить тему">Тёмная тема</button>
  </header>

  <main>
    <p>Эта страница автоматически определяет системную тему через медиа-запрос, сохраняет выбор пользователя и плавно переключает цвета.</p>
    
    <div class="card">
      <h2>Пример карточки</h2>
      <p>Фон, текст и границы меняются в зависимости от выбранной схемы. Плавные переходы заданы через CSS-переменные.</p>
    </div>
  </main>

  <!-- Скрипт загружается после DOM -->
  <script src="script.js"></script>
</body>
</html>
